<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Carrito - MiniMarket</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="cart-container">
        <div class="cart-header">
            <h1>Tu carrito</h1>
            <span class="cart-icon">🛒</span>
        </div>

        <div class="cart-items">
            <div class="cart-item">
                <div class="item-image">
                    <span class="placeholder-icon"></span>
                </div>
                <div class="item-details">
                    <div class="item-title">Título del producto</div>
                    <div class="item-price">Precio</div>
                </div>
            </div>
        </div>

        <div class="cart-summary">
            <div class="summary-row">
                <span class="summary-label">Productos</span>
                <span class="summary-value">Cantidad</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Total en impuestos</span>
                <span class="summary-value">Cantidad</span>
            </div>
            <div class="summary-row total">
                <span class="summary-label">Total del pedido</span>
                <span class="summary-value">Cantidad</span>
            </div>
        </div>

        <button class="pay-button">
            <a href="payment.html">Pagar</a>
        </button>
    </div>
</body>
</html>
